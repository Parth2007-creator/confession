<!DOCTYPE html>
<html>
<head>
  <title>Smart Locker</title>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Smart Locker</h2>

<button onclick="startSubmit()">Submit</button>
<button onclick="startRetrieve()">Retrieve</button>

<div id="reader"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDNXpPS52i6WlsCEP7eYZqQ6Jt0oieQjxI",
  databaseURL: "https://campus-expert-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

let mode = "";
let scanner = null;

function startSubmit() {
  mode = "submit";
  startScanner();
}

function startRetrieve() {
  mode = "retrieve";
  startScanner();
}

function startScanner() {

  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      initScanner();
    });
  } else {
    initScanner();
  }
}

function initScanner() {

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 5, qrbox: 250 },
    (text) => {

      let prn = text.trim(); // ONLY THIS

      alert("PRN: " + prn);

      scanner.stop().then(() => scanner.clear());

      if (mode === "submit") submitFlow(prn);
      else retrieveFlow(prn);
    }
  );
}

function submitFlow(prn) {

  firebase.database().ref("locker").set({
    currentPRN: prn
  });

  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Saved & Opened");
}

function retrieveFlow(prn) {

  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Opened");
}

</script>

</body>
</html>
