<!DOCTYPE html>
<html>
<head>
  <title>Smart Locker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>Smart Locker</h2>

<button onclick="startSubmit()">Submit</button>
<button onclick="startRetrieve()">Retrieve</button>

<div id="reader" style="width:300px; margin:auto;"></div>

<script>

// 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDNXpPS52i6WlsCEP7eYZqQ6Jt0oieQjxI",
  databaseURL: "https://campus-expert-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

let mode = "";

// ---------------- BUTTONS ----------------
function startSubmit() {
  mode = "submit";
  startScanner();
}

function startRetrieve() {
  mode = "retrieve";
  startScanner();
}

// ---------------- SCANNER ----------------
function startScanner() {

  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10 },
    (text) => {

      let data = text.split("|");

      let name = data[0];
      let prn = data[1];
      let branch = data[2];

      alert("Welcome " + name);

      scanner.stop();

      if (mode === "submit") {
        submitFlow(name, prn);
      } else {
        retrieveFlow(name, prn);
      }
    }
  );
}

// ---------------- SUBMIT ----------------
function submitFlow(name, prn) {

  // 🔥 SEND COMMAND TO ESP
  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Locker Opened for " + name);
}

// ---------------- RETRIEVE ----------------
function retrieveFlow(name, prn) {

  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Locker Opened for " + name);
}

</script>

</body>
</html>
