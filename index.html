<!DOCTYPE html>
<html>
<head>
  <title>Smart Locker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>Smart Locker</h2>

<button onclick="startSubmit()">Submit</button>
<button onclick="startRetrieve()">Retrieve</button>

<div id="reader"></div>

<script>

// 🔥 REPLACE WITH YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDNXpPS52i6WlsCEP7eYZqQ6Jt0oieQjxI",
  databaseURL: "https://campus-expert-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

let mode = "";
let scanner = null;

// -------- BUTTONS --------
function startSubmit() {
  mode = "submit";
  startScanner();
}

function startRetrieve() {
  mode = "retrieve";
  startScanner();
}

// -------- START SCANNER --------
function startScanner() {

  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      initScanner();
    });
  } else {
    initScanner();
  }
}

// -------- INIT SCANNER --------
function initScanner() {

  scanner = new Html5Qrcode("reader");

  let lastScan = "";
  let scanCount = 0;

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 5,
      qrbox: { width: 280, height: 280 }
    },
    (text) => {

      // 🔥 CLEAN PRN
      let prn = text.replace(/\s/g, "");

      // 🔥 DOUBLE READ CONFIRM
      if (prn === lastScan) {
        scanCount++;
      } else {
        lastScan = prn;
        scanCount = 1;
      }

      if (scanCount < 2) return;

      alert("PRN: " + prn);

      scanner.stop().then(() => scanner.clear());

      if (mode === "submit") submitFlow(prn);
      else retrieveFlow(prn);
    },
    (error) => {}
  );
}

// -------- SUBMIT --------
function submitFlow(prn) {

  firebase.database().ref("locker/currentPRN").once("value")
    .then((snapshot) => {

      if (snapshot.exists() && snapshot.val() !== "none") {
        alert("Locker already occupied ❌");
        return;
      }

      // store PRN
      firebase.database().ref("locker").set({
        currentPRN: prn
      });

      // open locker
      firebase.database().ref("commands").set({
        action: "open"
      });

      alert("Stored & Locker Opened ✅");
    });
}

// -------- RETRIEVE --------
function retrieveFlow(prn) {

  firebase.database().ref("locker/currentPRN").once("value")
    .then((snapshot) => {

      let storedPRN = snapshot.val();

      if (storedPRN === prn) {

        firebase.database().ref("commands").set({
          action: "open"
        });

        // reset
        firebase.database().ref("locker").set({
          currentPRN: "none"
        });

        alert("Access Granted ✅");

      } else {
        alert("Wrong ID ❌");
      }
    });
}

</script>

</body>
</html>
