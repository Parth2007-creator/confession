<!DOCTYPE html>
<html>
<head>
  <title>Smart Locker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
    }

    #reader {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<h2>Smart Locker</h2>

<button onclick="startSubmit()">Submit</button>
<button onclick="startRetrieve()">Retrieve</button>

<div id="reader"></div>

<script>

// 🔥 PUT YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDNXpPS52i6WlsCEP7eYZqQ6Jt0oieQjxI",
  databaseURL: "https://campus-expert-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

let mode = "";
let scanner = null;

// -------- BUTTONS --------
function startSubmit() {
  mode = "submit";
  startScanner();
}

function startRetrieve() {
  mode = "retrieve";
  startScanner();
}

// -------- SCANNER --------
function startScanner() {

  // hide buttons → full screen experience
  document.body.innerHTML = '<div id="reader"></div>';

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13
      ] // 🔥 ONLY BARCODE
    },
    (text) => {

      let prn = text.trim();

      alert("PRN: " + prn);

      scanner.stop().then(() => scanner.clear());

      if (mode === "submit") submitFlow(prn);
      else retrieveFlow(prn);
    },
    (error) => {}
  );
}

// -------- SUBMIT --------
function submitFlow(prn) {

  firebase.database().ref("locker").set({
    currentPRN: prn
  });

  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Saved & Opened");
}

// -------- RETRIEVE --------
function retrieveFlow(prn) {

  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Opened");
}

</script>

</body>
</html>
