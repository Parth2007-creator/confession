<!DOCTYPE html>
<html lang="en">
  <head>
    <script type="module">
      import { injectIntoGlobalHook } from &#34;/@react-refresh&#34;;
injectIntoGlobalHook(window);
window.$RefreshReg$ = () =&gt; {};
window.$RefreshSig$ = () =&gt; (type) =&gt; type;
    </script>
    <script type="module" src="/@vite/client">
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      CampusHub Station
    </title>
    <meta name="description" content="Smart campus utility station - Lost &amp; Found and Waste Segregation Dashboard" />
    <meta name="author" content="CampusHub" />
    <meta property="og:title" content="CampusHub Station" />
    <meta property="og:description" content="Smart campus utility station - Lost &amp; Found and Waste Segregation Dashboard" />
    <meta property="og:type" content="website" />

    <script type="module">
      import{createHotContext}from&#39;/@vite/client&#39;;const h=createHotContext(&#39;/@vibecode-hmr&#39;);
window.addEventListener(&#39;message&#39;,e=&gt;{const d=e.data;
if(d?.type===&#39;vibecode:override&#39;)h.send(&#39;vibecode:override&#39;,{path:d.path,content:d.content});
else if(d?.type===&#39;vibecode:clear-override&#39;)h.send(&#39;vibecode:clear-override&#39;,{path:d.path});
else if(d?.type===&#39;vibecode:clear-all-overrides&#39;)h.send(&#39;vibecode:clear-all-overrides&#39;,{});});
    </script>
    <script>
      (function(){
  var loaded=false;
  var allowedOrigins=[&#39;https://vibecodeapp.com&#39;,&#39;https://www.vibecodeapp.com&#39;,&#39;https://vibecode.dev&#39;,&#39;http://www.vibecode.dev&#39;,&#39;http://localhost:3001&#39;];
  var allowedSdkUrls=[&#39;https://images.composerapi.com/&#39;,&#39;https://api.vibecodeapp.com/&#39;];
  window.addEventListener(&#39;message&#39;,function(e){
    if(!allowedOrigins.includes(e.origin))return;
    if(e.data?.type===&#39;vibecode:sdk:load&#39;&amp;&amp;!loaded){
      if(!allowedSdkUrls.some(function(u){return e.data.url.startsWith(u)}))return;
      loaded=true;
      window.__VIBECODE_CONFIG__=e.data;
      var s=document.createElement(&#39;script&#39;);
      s.src=e.data.url;
      s.onerror=function(){console.warn(&#39;[vibecode] SDK failed to load&#39;)};
      document.head.appendChild(s);
    }
  });
  if(window.parent!==window){
    window.parent.postMessage({type:&#39;vibecode:sdk:ready-for-config&#39;},&#39;*&#39;);
  }
})();
    </script>
  </head>
  <body>
    <div id="root">
    </div>
    <script type="module" src="/src/main.tsx">
    </script>
  </body>
</html>
