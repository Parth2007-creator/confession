<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>CampusHub | Dashboard</title>
  
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    .neumorphic-card { background: #ffffff; box-shadow: 6px 6px 12px rgba(164, 185, 206, 0.4); }
    .hidden { display: none !important; }
  </style>
</head>

<body class="bg-[#ebfdff] font-body text-on-surface min-h-screen">

  <nav id="main-nav" class="fixed left-4 top-4 bottom-4 w-64 rounded-xl bg-gradient-to-br from-[#89F7FE] to-[#66A6FF] p-8 z-50">
      <h1 class="text-2xl font-black text-white">CampusHub</h1>
  </nav>

  <main id="main-dashboard" class="ml-72 p-12">
      <h2 class="text-5xl font-extrabold mb-12">Hello, Student</h2>
      </main>

  <script type="module">
    const urlParams = new URLSearchParams(window.location.search);
    const stationId = urlParams.get('station');

    if (stationId === 'box_01') {
        // 1. Dashboard gayab kara
        document.getElementById('main-nav').classList.add('hidden');
        document.getElementById('main-dashboard').classList.add('hidden');
        document.body.style.backgroundColor = "#f0f2f5";

        // 2. Station UI dakhva
        const stationHTML = `
            <div id="station-interface" class="flex flex-col items-center justify-center min-h-screen p-6">
                <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                    <h1 class="text-2xl font-black text-slate-800 mb-2">Smart <span class="text-blue-600">Locker</span></h1>
                    <p class="text-slate-500 text-sm mb-8">Station ID: ${stationId}</p>
                    
                    <div id="action-buttons" class="grid gap-4">
                        <button id="btn-store" class="bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg active:scale-95 transition-all">Store Item</button>
                        <button id="btn-retrieve" class="bg-emerald-600 text-white py-5 rounded-2xl font-bold text-lg active:scale-95 transition-all">Retrieve Item</button>
                    </div>

                    <div id="reader-container" class="hidden mt-6">
                        <div id="reader" style="width: 100%;" class="rounded-2xl overflow-hidden border-4 border-blue-50"></div>
                    </div>

                    <div id="photo-section" class="hidden mt-6">
                        <video id="video" autoplay class="w-full rounded-2xl bg-black"></video>
                        <button id="btn-take-photo" class="mt-6 bg-slate-900 text-white w-full py-4 rounded-xl font-bold">Take Photo & Submit</button>
                        <canvas id="canvas" class="hidden"></canvas>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('afterbegin', stationHTML);

        // 3. IMPORTANT: UI create jhalyavarach scan.js load kara
        import('./src/scan.js').then(module => {
            console.log("Scanner Logic Loaded!");
        }).catch(err => {
            console.error("Scan.js load honyat error: ", err);
        });
    }
  </script>
</body>
</html>
