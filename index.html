<!DOCTYPE html>
<html>
<head>
  <title>Smart Locker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>Smart Locker</h2>

<button onclick="startSubmit()">Submit</button>
<button onclick="startRetrieve()">Retrieve</button>

<div id="reader"></div>

<script>

// 🔥 PUT YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDNXpPS52i6WlsCEP7eYZqQ6Jt0oieQjxI",
  databaseURL: "https://campus-expert-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

let mode = "";
let scanner = null;

// -------- BUTTONS --------
function startSubmit() {
  mode = "submit";
  startScanner();
}

function startRetrieve() {
  mode = "retrieve";
  startScanner();
}

// -------- SCANNER --------
function startScanner() {

  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      initScanner();
    });
  } else {
    initScanner();
  }
}

function initScanner() {

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 5,
      qrbox: { width: 280, height: 280 }
    },
    (text) => {

      let prn = text.replace(/\s/g, ""); // clean only

      alert("PRN: " + prn);

      scanner.stop().then(() => scanner.clear());

      if (mode === "submit") submitFlow(prn);
      else retrieveFlow(prn);
    },
    (error) => {}
  );
}

// -------- SUBMIT --------
function submitFlow(prn) {

  // 🔥 ALWAYS SAVE (no checking)
  firebase.database().ref("locker").set({
    currentPRN: prn
  });

  // 🔥 OPEN LOCKER
  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Saved & Opened");
}

// -------- RETRIEVE --------
function retrieveFlow(prn) {

  // 🔥 JUST OPEN (NO CHECK)
  firebase.database().ref("commands").set({
    action: "open"
  });

  alert("Opened");
}

</script>

</body>
</html>
